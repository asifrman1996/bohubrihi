{% extends 'base.html' %}
{% block title %}Cart – Bohubrihi{% endblock %}

{% block content %}
<div class="container" style="padding-top: 28px;">
  <h1 style="color:var(--navy); margin-bottom:24px; font-size:1.6rem;">Your Cart</h1>
  <div id="fullCartWrap">
    <!-- Empty state (replaced by JS if cart has items) -->
    <div style="text-align:center; padding:80px 0; color:var(--muted);">
      <div style="font-size:3.5rem; margin-bottom:16px;">🛒</div>
      <h3 style="color:var(--navy); margin-bottom:8px;">Your cart is empty</h3>
      <p style="margin-bottom:20px;">Add some products to get started.</p>
      <a href="{{ url_for('shop') }}" class="btn btn--primary" style="display:inline-flex;">Shop Now</a>
    </div>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script>
document.addEventListener('DOMContentLoaded', () => {
  const wrap = document.getElementById('fullCartWrap');
  if (!cart || cart.length === 0) return;

  let total = 0;

  const itemsHtml = cart.map(item => {
    const sub = item.price * item.qty;
    total += sub;
    const imgHtml = item.image
      ? `<img src="${imageSrc(item.image)}" alt="${item.name}">`
      : `<span>${getCatIcon(item.cat)}</span>`;
    return `
      <div class="cart-page-item">
        <div class="cart-page-item-img">${imgHtml}</div>
        <div class="cart-page-item-info">
          <div class="cart-page-item-name">${item.name}</div>
          <div class="cart-page-item-meta">${item.cat || ''}</div>
          <div class="cart-page-item-row">
            <div class="qty-ctrl">
              <button class="qty-btn" onclick="updateQty(${item.id},-1,'${item.type||'product'}');location.reload()">−</button>
              <span class="qty-num">${item.qty}</span>
              <button class="qty-btn" onclick="updateQty(${item.id},1,'${item.type||'product'}');location.reload()">+</button>
            </div>
            <span class="cart-page-item-price">৳${item.price} each</span>
          </div>
        </div>
        <div class="cart-page-item-right">
          <button class="cart-page-remove" onclick="removeFromCart(${item.id},'${item.type||'product'}');location.reload()" title="Remove">✕</button>
          <span class="cart-page-item-sub">৳${sub.toFixed(0)}</span>
        </div>
      </div>`;
  }).join('');

  wrap.innerHTML = `
    <div class="cart-page-layout">
      <div class="cart-page-items-col">
        ${itemsHtml}
        <a href="/shop" style="display:inline-flex;align-items:center;gap:6px;color:var(--muted);font-size:.85rem;margin-top:20px;text-decoration:none;">← Continue Shopping</a>
      </div>
      <div class="cart-page-summary-col">
        <div class="cart-page-total-row">
          <span>Total</span>
          <span class="cart-page-total-val">৳${total.toFixed(0)}</span>
        </div>
        <a href="/checkout" class="btn-checkout" style="display:block;text-align:center;">Proceed to Checkout →</a>
        <p style="text-align:center;font-size:.75rem;color:var(--muted);margin-top:10px;margin-bottom:0;">Free delivery on orders above ৳2500</p>
      </div>
    </div>`;
});
</script>
{% endblock %}
