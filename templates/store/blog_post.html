{% extends 'base.html' %}
{% block title %}{{ post.title }} – Bohubrihi Blog{% endblock %}

{% block content %}
<article class="blog-post-page">
  {% if post.cover_image %}
  <img class="blog-post-cover" src="{{ sized_image_url(post.cover_image, 800, 85) }}" alt="{{ post.title }}" loading="lazy">
  {% endif %}

  <div class="blog-post-body">
    <h1>{{ post.title }}</h1>
    <p class="blog-post-meta">
      Published {{ post.created_at.strftime('%d %B %Y') }} &nbsp;·&nbsp;
      <a href="{{ url_for('blog_index') }}" style="color:var(--teal);">← All posts</a>
    </p>
    <div class="blog-post-content">
      {{ post.body | safe }}
    </div>
  </div>
</article>
{% endblock %}
